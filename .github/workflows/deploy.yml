name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build with pygbag
        run: python -m pygbag --build .

      - name: Back button + black background
        run: |
          python3 -c "
          html = open('build/web/index.html').read()
          css = '''<style>
          body { background: #000 !important; }
          #back-btn {
            position: fixed; top: 10px; left: 10px; z-index: 999999;
            background: rgba(0,0,0,0.6); color: #ffd700; padding: 8px 16px;
            text-decoration: none; border-radius: 8px; font-family: arial;
            font-size: 14px; border: 1px solid #ffd700;
          }
          #back-btn:hover { background: rgba(255,215,0,0.2); }
          </style>'''
          btn = '<a id=\"back-btn\" href=\"../\">&#8592; Retour</a>'
          html = html.replace('</head>', css + '</head>')
          html = html.replace('</body>', btn + '</body>')
          open('build/web/index.html', 'w').write(html)
          "

      - name: Assemble site
        run: |
          mkdir -p site/play
          cp web/index.html site/
          cp web/preview.png site/
          cp build/web/* site/play/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
