name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build with pygbag
        run: python -m pygbag --build .

      - name: Add download button
        run: |
          python3 -c "
          html = open('build/web/index.html').read()
          btn = '<a href=\"https://github.com/Isaku202/anomalia/releases/latest/download/anomalia-v1.0.zip\" style=\"position:fixed;top:10px;right:10px;z-index:999999;background:#4CAF50;color:white;padding:10px 20px;text-decoration:none;border-radius:8px;font-family:arial;font-weight:bold;font-size:14px;box-shadow:0 2px 5px rgba(0,0,0,0.3);\">Telecharger le jeu</a>'
          html = html.replace('</body>', btn + '</body>')
          open('build/web/index.html', 'w').write(html)
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
